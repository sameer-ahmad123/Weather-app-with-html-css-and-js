<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="weather-card">
        <h2 class="app-title">Weather Finder</h2>
        
        <div class="search-container">
            <input type="text" id="city-input" placeholder="Enter a city (e.g., London)" autocomplete="off">
            <button id="search-btn">Search</button>
        </div>

        <div id="weather-display" class="hidden">
            <div class="weather-main">
                <h1 id="temp">--°C</h1>
                <h2 id="city-name">City</h2>
            </div>
            <div class="weather-details">
                <p id="description">--</p>
                <div class="extra-info">
                    <p>💧 Humidity: <span id="humidity">--</span>%</p>
                    <p>💨 Wind: <span id="wind">--</span> km/h</p>
                </div>
            </div>
        </div>
        
        <p id="loading-msg" class="hidden">Fetching data...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
